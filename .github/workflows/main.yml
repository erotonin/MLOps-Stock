name: FinCast-Mini MLOps CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest ruff
    - name: Lint with ruff
      run: ruff check .
    - name: Run Academic Verification
      run: |
        # We run a subset of validation to ensure model integrity in CI
        python academic_validation.py --symbol FPT
    - name: Run Security Tests
      run: |
        pytest test_production_system.py
